services:
  outage-map:
    # Prebuilt image published by .github/workflows/docker-publish.yml on every
    # push to main. Using a prebuilt image instead of `pull_policy: build` keeps
    # Portainer redeploys fast (seconds, not minutes), which avoids the
    # "Saving..." spinner hanging past Portainer's HTTP/proxy timeout while a
    # local Dockerfile build is still running in the background.
    #
    # To build from source instead (offline or development), run
    # `docker compose -f docker-compose.yml -f docker-compose.build.yml up -d`.
    image: ${OUTAGE_MAP_IMAGE:-ghcr.io/tri-lumen/outage-map:latest}
    pull_policy: always
    container_name: outage-map
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3100}:3100"
    environment:
      NODE_ENV: production
      DATABASE_PATH: /app/data/outage.db
      POLL_INTERVAL_MINUTES: ${POLL_INTERVAL_MINUTES:-3}
      CRON_SECRET: ${CRON_SECRET:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      ALERT_FROM: ${ALERT_FROM:-}
      ALERT_EMAILS: ${ALERT_EMAILS:-}
      DOWNDETECTOR_ENABLED: ${DOWNDETECTOR_ENABLED:-true}
      DD_REPORT_THRESHOLD_DEGRADED: ${DD_REPORT_THRESHOLD_DEGRADED:-100}
      DD_REPORT_THRESHOLD_MAJOR: ${DD_REPORT_THRESHOLD_MAJOR:-500}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3100}
    volumes:
      - outage-map-data:/app/data

volumes:
  outage-map-data:
    driver: local
